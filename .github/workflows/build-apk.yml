name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Android
        run: |
          npx cap sync android

      - name: Inject Custom Android Configurations
        run: |
          if [ -f "android-app-build.gradle" ]; then
            cp android-app-build.gradle android/app/build.gradle
          fi
          if [ -f "AndroidManifest.xml" ]; then
            cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Build Android App (Release/Debug)
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

